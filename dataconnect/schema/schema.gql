type User @table {
  displayName: String!
  email: String!
  avatarUrl: String
}

type Project @table {
  name: String!
  owner: User!
  description: String
  createdAt: Timestamp
}

type Sprint @table {
  name: String!
  startDate: Date!
  endDate: Date!
  project: Project!
}

type Task @table {
  title: String!
  status: String!
  creator: User!
  description: String
  dueDate: Timestamp
  assignee: User
  project: Project!
  sprint: Sprint
}

type Comment @table {
  content: String!
  user: User!
  task: Task!
}